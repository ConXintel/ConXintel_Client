<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none" aria-hidden="true">
  <defs>
    <radialGradient id="conx-logo-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ed2024" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#ed2024" stop-opacity="0"/>
    </radialGradient>
    <style>
      @keyframes conx-logo-glow-pulse {
        0%, 100% { opacity: 0.65; }
        50% { opacity: 1; }
      }
      @keyframes conx-logo-dot-scan {
        0%, 100% { opacity: 0.2; }
        50% { opacity: 0.5; }
      }
      @keyframes conx-logo-node-pulse {
        0%, 100% { opacity: 0.65; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.12); }
      }
      @keyframes conx-logo-orbit-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes conx-logo-frame-pulse {
        0%, 100% { stroke-opacity: 0.24; }
        50% { stroke-opacity: 0.42; }
      }
      @keyframes conx-logo-k-glow {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.88; }
      }
      @keyframes conx-logo-pivot-pulse {
        0%, 100% { opacity: 0.85; }
        50% { opacity: 1; }
      }
      .conx-logo-glow {
        animation: conx-logo-glow-pulse 4s ease-in-out infinite;
      }
      .conx-logo-frame {
        animation: conx-logo-frame-pulse 3.5s ease-in-out infinite;
      }
      .conx-logo-globe-dots circle {
        transform-box: fill-box;
        transform-origin: center;
        animation: conx-logo-dot-scan 2.6s ease-in-out infinite;
      }
      .conx-logo-globe-dots circle:nth-child(3n) { animation-delay: 0.35s; }
      .conx-logo-globe-dots circle:nth-child(3n + 1) { animation-delay: 0.85s; }
      .conx-logo-globe-dots circle:nth-child(3n + 2) { animation-delay: 1.35s; }
      .conx-logo-node {
        transform-box: fill-box;
        transform-origin: center;
        animation: conx-logo-node-pulse 2.2s ease-in-out infinite;
      }
      .conx-logo-node:nth-child(2) { animation-delay: 0.5s; }
      .conx-logo-node:nth-child(3) { animation-delay: 1s; }
      .conx-logo-node:nth-child(4) { animation-delay: 0.25s; }
      .conx-logo-node:nth-child(5) { animation-delay: 0.75s; }
      .conx-logo-orbit-wrap {
        transform-origin: 44px 32px;
        animation: conx-logo-orbit-spin 22s linear infinite;
      }
      .conx-logo-k {
        animation: conx-logo-k-glow 3s ease-in-out infinite;
      }
      .conx-logo-pivot {
        transform-box: fill-box;
        transform-origin: center;
        animation: conx-logo-pivot-pulse 2s ease-in-out infinite;
      }
      @media (prefers-reduced-motion: reduce) {
        .conx-logo-glow,
        .conx-logo-frame,
        .conx-logo-globe-dots circle,
        .conx-logo-node,
        .conx-logo-orbit-wrap,
        .conx-logo-k,
        .conx-logo-pivot {
          animation: none !important;
        }
      }
    </style>
  </defs>

  <rect width="64" height="64" rx="14" fill="#120e11"/>
  <rect class="conx-logo-frame" width="64" height="64" rx="14" stroke="#ed2024" stroke-opacity="0.28" stroke-width="1.5"/>
  <circle class="conx-logo-glow" cx="44" cy="32" r="22" fill="url(#conx-logo-glow)"/>

  <g class="conx-logo-globe-dots" fill="#ed2024" opacity="0.38">
    <circle cx="44" cy="14" r="1.15"/>
    <circle cx="38" cy="16" r="1.15"/><circle cx="50" cy="16" r="1.15"/>
    <circle cx="33" cy="19" r="1.15"/><circle cx="44" cy="19" r="1.15"/><circle cx="55" cy="19" r="1.15"/>
    <circle cx="30" cy="23" r="1.15"/><circle cx="37" cy="23" r="1.15"/><circle cx="44" cy="23" r="1.15"/><circle cx="51" cy="23" r="1.15"/><circle cx="58" cy="23" r="1.15"/>
    <circle cx="28" cy="27" r="1.15"/><circle cx="35" cy="27" r="1.15"/><circle cx="42" cy="27" r="1.15"/><circle cx="49" cy="27" r="1.15"/><circle cx="56" cy="27" r="1.15"/>
    <circle cx="27" cy="32" r="1.15"/><circle cx="34" cy="32" r="1.15"/><circle cx="41" cy="32" r="1.15"/><circle cx="48" cy="32" r="1.15"/><circle cx="55" cy="32" r="1.15"/><circle cx="61" cy="32" r="1.15"/>
    <circle cx="28" cy="37" r="1.15"/><circle cx="35" cy="37" r="1.15"/><circle cx="42" cy="37" r="1.15"/><circle cx="49" cy="37" r="1.15"/><circle cx="56" cy="37" r="1.15"/>
    <circle cx="30" cy="41" r="1.15"/><circle cx="37" cy="41" r="1.15"/><circle cx="44" cy="41" r="1.15"/><circle cx="51" cy="41" r="1.15"/><circle cx="58" cy="41" r="1.15"/>
    <circle cx="33" cy="45" r="1.15"/><circle cx="44" cy="45" r="1.15"/><circle cx="55" cy="45" r="1.15"/>
    <circle cx="38" cy="48" r="1.15"/><circle cx="50" cy="48" r="1.15"/>
    <circle cx="44" cy="50" r="1.15"/>
  </g>

  <g class="conx-logo-node" fill="#ff5a5e">
    <circle cx="27" cy="32" r="1.35" opacity="0.85"/>
    <circle cx="44" cy="32" r="1.5" opacity="0.95"/>
    <circle cx="61" cy="32" r="1.35" opacity="0.85"/>
    <circle cx="44" cy="23" r="1.25" opacity="0.7"/>
    <circle cx="44" cy="41" r="1.25" opacity="0.7"/>
  </g>

  <g class="conx-logo-orbit-wrap">
    <circle cx="44" cy="32" r="21" stroke="#ed2024" stroke-opacity="0.22" stroke-width="1" stroke-dasharray="2.5 4" fill="none"/>
  </g>

  <path
    class="conx-logo-k"
    d="M20 22L36 42M36 22L20 42"
    stroke="#ed2024"
    stroke-width="4"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <circle class="conx-logo-pivot" cx="28" cy="32" r="2" fill="#ff5a5e"/>
</svg>
